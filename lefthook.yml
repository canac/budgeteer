pre-commit:
  parallel: true
  commands:
    tsc:
      run: pnpm lint:ts
    oxfmt:
      run: pnpm oxfmt --no-error-on-unmatched-pattern --write {staged_files}
      stage_fixed: true
    oxlint:
      run: pnpm oxlint --no-error-on-unmatched-pattern --deny-warnings --fix {staged_files}
      stage_fixed: true
